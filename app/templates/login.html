{% extends "base.html" %}

{% block title %}Вход — Бонусные карты{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-sm-8 col-md-5 col-lg-4">

    <div class="text-center mb-4">
      <i class="bi bi-credit-card-2-front-fill text-primary" style="font-size: 3rem;"></i>
      <h4 class="mt-2 fw-semibold">Поиск бонусной карты</h4>
      <p class="text-muted small">Войдите в систему, чтобы продолжить</p>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">

        <!-- Сообщение об ошибке -->
        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show py-2" role="alert">
          <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <form method="post" action="/login" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-medium">Логин</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-person"></i>
              </span>
              <input
                id="username"
                name="username"
                type="text"
                class="form-control"
                placeholder="Введите логин"
                autocomplete="username"
                required
                autofocus
              />
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-medium">Пароль</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-lock"></i>
              </span>
              <input
                id="password"
                name="password"
                type="password"
                class="form-control"
                placeholder="Введите пароль"
                autocomplete="current-password"
                required
              />
            </div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg fw-medium">
              <i class="bi bi-box-arrow-in-right me-2"></i>Войти
            </button>
          </div>
        </form>

      </div>
    </div>

  </div>
</div>
{% endblock %}
